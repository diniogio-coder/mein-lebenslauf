<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex, nosnippet">
<meta name="googlebot" content="noindex, nofollow, noarchive">
<title>Dinio Maag — Lebenslauf</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green: #1DB954;
  --black: #121212;
  --surface: #181818;
  --surface2: #242424;
  --surface3: #2e2e2e;
  --text: #FFFFFF;
  --muted: #b3b3b3;
  --faint: #535353;
  --sidebar: 240px;
  --detail-width: 320px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--black);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.hidden { display: none !important; }

.app {
  display: flex;
  flex: 1;
  gap: 8px;
  padding: 8px 8px 0 8px;
  overflow: hidden;
  min-height: 0;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: var(--sidebar);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}
.sidebar-top {
  background: var(--surface);
  border-radius: 8px;
  padding: 20px 12px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 8px 12px;
  border-radius: 4px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: color .15s;
}
.nav-link:hover, .nav-link.active { color: var(--text); }
.sidebar-lib {
  background: var(--surface);
  border-radius: 8px;
  padding: 12px;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.sidebar-lib::-webkit-scrollbar { display: none; }
.lib-heading {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 700;
  padding: 4px 8px 12px;
}
.pl-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background .15s;
}
.pl-item:hover { background: var(--surface2); }
.pl-item.active { background: var(--surface3); }
.pl-thumb {
  width: 44px; height: 44px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  overflow: hidden;
}
.pl-thumb img { width: 100%; height: 100%; object-fit: cover; }
.pl-label { overflow: hidden; }
.pl-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* ── CENTER MAIN ── */
.main {
  flex: 1;
  background: var(--surface);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  min-width: 0;
}
.topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 20;
  background: linear-gradient(to bottom, rgba(0,0,0,.5) 0%, transparent 100%);
  pointer-events: none;
}
.topbar-btns { display: flex; gap: 8px; pointer-events: all; }
.top-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,.7);
  border: none; color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.top-btn:hover { background: rgba(0,0,0,.9); }
.top-user {
  pointer-events: all;
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,.7);
  border-radius: 20px;
  padding: 3px 10px 3px 3px;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
}
.user-av {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--green);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900;
}

.content {
  flex: 1;
  overflow-y: auto;
  min-height: 0;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 3px; }
.content::-webkit-scrollbar-track { background: transparent; }

/* ── HERO BANNER ── */
.hero-banner {
  position: relative;
  width: 100%;
  height: 280px;
  overflow: hidden;
  flex-shrink: 0;
  /* Fallback-Gradient — sichtbar solange banner.jpg fehlt oder lädt */
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 70%, #1a1a2e 100%);
}
.hero-banner-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.hero-deco {
  position: absolute;
  border-radius: 50%;
  opacity: .08;
  pointer-events: none;
}
.hero-banner-inner {
  position: absolute; inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 32px 32px 28px;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, transparent 60%);
}
.hero-tag {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--green);
  margin-bottom: 8px;
}
.hero-name {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  margin-bottom: 8px;
  text-shadow: 0 2px 20px rgba(0,0,0,.5);
}
.hero-sub {
  font-size: 16px;
  color: rgba(255,255,255,.8);
  font-weight: 400;
}

/* HOME */
#view-home { padding-bottom: 24px; }
.home-greeting { padding: 20px 24px 4px; font-size: 20px; font-weight: 700; }
.section { padding: 12px 24px 24px; }
.sec-title { font-size: 20px; font-weight: 700; margin-bottom: 14px; }

.quick-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.q-card {
  display: flex; align-items: center;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: background .15s;
}
.q-card:hover { background: #333; }
.q-icon {
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
  overflow: hidden;
}
.q-icon img { width: 100%; height: 100%; object-fit: cover; }
.q-name { font-size: 13px; font-weight: 700; padding: 0 12px; }

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 20px;
}
.card {
  background: var(--surface2);
  border-radius: 8px;
  padding: 16px;
  cursor: pointer;
  transition: background .2s;
  position: relative;
}
.card:hover { background: var(--surface3); }
.card:hover .play-fab { opacity: 1; transform: translateY(0); }
.card-art {
  width: 100%; aspect-ratio: 1;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
  margin-bottom: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,.5);
  position: relative;
  overflow: hidden;
}
.card-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.card-art img + .card-art-emoji { display: none; }
.card-art-emoji { font-size: 48px; }
.play-fab {
  position: absolute; bottom: 8px; right: 8px;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--green);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transform: translateY(8px);
  transition: opacity .2s, transform .2s, background .15s;
  box-shadow: 0 8px 16px rgba(0,0,0,.5);
  z-index: 2;
}
.play-fab:hover { background: #1ed760; }
.card-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

/* PLAYLIST VIEW */
#view-playlist { padding-bottom: 32px; }
.pl-hero {
  padding: 80px 24px 24px;
  display: flex; align-items: flex-end; gap: 24px;
}
.hero-art-pl {
  width: 200px; height: 200px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  flex-shrink: 0;
  box-shadow: 0 16px 40px rgba(0,0,0,.6);
  overflow: hidden;
  position: relative;
}
.hero-art-pl img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.hero-type { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; color: var(--muted); }
.hero-title { font-size: 42px; font-weight: 900; line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 12px; }
.hero-meta { font-size: 13px; color: var(--muted); }
.hero-meta strong { color: var(--text); }
.pl-toolbar {
  padding: 20px 24px;
  display: flex; align-items: center; gap: 20px;
}
.play-big {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--green);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s, background .15s;
}
.play-big:hover { background: #1ed760; transform: scale(1.05); }
.toolbar-desc { font-size: 13px; color: var(--muted); }

/* Track list — now with album art column */
.track-table { padding: 0 24px; }
.track-header {
  display: grid;
  grid-template-columns: 40px 52px 1fr 180px 150px;
  gap: 12px;
  padding: 6px 12px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  margin-bottom: 4px;
  color: var(--muted);
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  align-items: center;
}
.track-row {
  display: grid;
  grid-template-columns: 40px 52px 1fr 180px 150px;
  gap: 12px;
  padding: 6px 12px;
  border-radius: 6px;
  align-items: center;
  cursor: pointer;
  transition: background .15s;
}
.track-row:hover { background: var(--surface2); }
.track-row.playing { background: rgba(29,185,84,.08); }
.track-row.playing .t-name { color: var(--green); }
.track-row.playing .t-num { color: var(--green); }

.t-idx { text-align: center; }
.t-num { color: var(--muted); font-size: 15px; }
.t-play { display: none; color: var(--text); font-size: 14px; }
.track-row:hover .t-num { display: none; }
.track-row:hover .t-play { display: block; }

/* Album cover in track row */
.t-cover {
  width: 44px; height: 44px;
  border-radius: 4px;
  overflow: hidden;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.t-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

.t-main { overflow: hidden; }
.t-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-place { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-year { font-size: 13px; color: var(--muted); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── RIGHT DETAIL PANEL ── */
.detail-panel {
  width: 0;
  flex-shrink: 0;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  transition: width .35s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
}
.detail-panel.open { width: var(--detail-width); }
.detail-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,.1);
  border: none; cursor: pointer;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: background .15s, color .15s;
  z-index: 5;
}
.detail-close:hover { background: rgba(255,255,255,.2); color: var(--text); }
.detail-inner {
  width: var(--detail-width);
  height: 100%;
  overflow-y: auto;
  padding: 0 0 24px;
  position: relative;
  display: flex;
  flex-direction: column;
}
.detail-inner::-webkit-scrollbar { width: 4px; }
.detail-inner::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

.detail-img {
  width: 100%;
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.detail-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.detail-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 40%, var(--surface) 100%);
  pointer-events: none;
  z-index: 1;
}
.detail-body { padding: 16px 20px 0; flex: 1; }
.detail-tag {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--green); margin-bottom: 6px;
}
.detail-title { font-size: 18px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
.detail-company {
  font-size: 13px; color: var(--muted);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}
.detail-year-badge {
  background: var(--surface2);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px; font-weight: 700; color: var(--text);
}
.detail-divider { height: 1px; background: rgba(255,255,255,.08); margin: 12px 0; }
.detail-text { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.8); }
.detail-text p { margin-bottom: 10px; }
.detail-text p:last-child { margin-bottom: 0; }
.detail-highlight {
  background: rgba(29,185,84,.12);
  border-left: 2px solid var(--green);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  margin: 14px 0;
  font-size: 13px; line-height: 1.55;
  color: rgba(255,255,255,.85);
}

/* ── PLAYER BAR ── */
.player {
  height: 84px;
  background: #0a0a0a;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center;
  padding: 0 16px; gap: 12px;
  flex-shrink: 0;
}
.now-wrap { display: flex; align-items: center; gap: 12px; width: 260px; min-width: 0; }
.now-thumb {
  width: 52px; height: 52px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; background: var(--surface2); flex-shrink: 0;
  cursor: pointer; transition: opacity .15s;
  overflow: hidden;
}
.now-thumb:hover { opacity: .8; }
.now-thumb img { width: 100%; height: 100%; object-fit: cover; }
.now-info { overflow: hidden; }
.now-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.player-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.p-ctrls { display: flex; align-items: center; gap: 18px; }
.p-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s; padding: 4px;
}
.p-btn:hover { color: var(--text); }
.p-btn:disabled { opacity: .3; cursor: default; }
.p-play {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: #fff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #000; transition: transform .1s;
}
.p-play:hover { transform: scale(1.08); }
.p-bar-wrap { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 460px; }
.p-time { font-size: 11px; color: var(--muted); min-width: 34px; text-align: center; font-variant-numeric: tabular-nums; }
.p-bar {
  flex: 1; height: 4px;
  background: var(--faint); border-radius: 2px;
  position: relative; cursor: pointer;
}
.p-fill { position: absolute; top: 0; left: 0; height: 100%; width: 0%; background: var(--muted); border-radius: 2px; pointer-events: none; }
.p-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 12px; height: 12px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity .15s; pointer-events: none; }
.p-bar:hover .p-fill { background: var(--green); }
.p-bar:hover .p-dot { opacity: 1; }

.now-panel-btn {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  padding: 6px; border-radius: 4px;
  transition: color .15s, background .15s;
  display: flex; align-items: center;
}
.now-panel-btn:hover { color: var(--text); background: rgba(255,255,255,.08); }
.now-panel-btn.active { color: var(--green); }

.player-right { width: 220px; display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.vol-bar { width: 90px; height: 4px; background: var(--faint); border-radius: 2px; cursor: pointer; }
.vol-fill { height: 100%; width: 70%; background: var(--muted); border-radius: 2px; }
.vol-bar:hover .vol-fill { background: var(--green); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { animation: fadeUp .3s ease both; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.slide-in { animation: slideIn .3s ease both; }

/* ── MOBILE BOTTOM NAV ── */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #0a0a0a;
  border-top: 1px solid rgba(255,255,255,.08);
  z-index: 100;
  height: 64px;
  padding: 0 8px;
  align-items: stretch;
}
.mobile-nav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  background: none; border: none;
  color: var(--muted);
  font-size: 10px; font-weight: 600;
  cursor: pointer;
  transition: color .15s;
  padding: 0;
}
.mobile-nav-btn.active { color: var(--text); }
.mobile-nav-btn svg { flex-shrink: 0; }

/* ── MOBILE DETAIL OVERLAY ── */
.detail-panel.mobile-overlay {
  position: fixed;
  inset: 0;
  width: 100% !important;
  z-index: 200;
  border-radius: 0;
  overflow-y: auto;
}
.detail-panel.mobile-overlay .detail-inner {
  width: 100%;
}

/* ── TABLET (≤ 900px) ── */
@media (max-width: 900px) {
  :root { --sidebar: 200px; --detail-width: 280px; }

  .hero-name { font-size: 38px; }
  .hero-title { font-size: 32px; }
  .hero-art-pl { width: 150px; height: 150px; font-size: 60px; }

  .track-header,
  .track-row {
    grid-template-columns: 32px 44px 1fr 100px;
  }
  .track-header > *:last-child,
  .track-row .t-year { display: none; }

  .now-wrap { width: 180px; }
  .player-right { width: 140px; }
}

/* ── SMALL TABLET / LARGE PHONE (≤ 680px) ── */
@media (max-width: 680px) {
  body { overflow: hidden; }

  .app {
    padding: 0;
    gap: 0;
    height: calc(100vh - 64px - 64px); /* minus player bar and mobile nav */
  }

  /* Hide sidebar entirely on mobile */
  .sidebar { display: none; }

  .main {
    border-radius: 0;
    height: 100%;
    flex: 1;
  }

  .content { overflow-y: auto; height: 100%; }

  /* Player bar adjustments */
  .player {
    height: 64px;
    padding: 0 12px;
    gap: 8px;
    position: fixed;
    bottom: 64px;
    left: 0; right: 0;
    z-index: 90;
  }

  /* Push app content up so player + nav don't overlap */
  body { padding-bottom: 128px; overflow: auto; height: auto; }
  .app { height: auto; min-height: calc(100vh - 128px); }

  .now-wrap { width: auto; flex: 1; min-width: 0; }
  .player-mid { display: none; }
  .player-right { width: auto; }

  /* Show mobile bottom nav */
  .mobile-nav { display: flex; }

  /* Hero banner smaller */
  .hero-banner { height: 200px; }
  .hero-banner-inner { padding: 24px 16px 20px; }
  .hero-name { font-size: 30px; letter-spacing: -1px; }
  .hero-sub { font-size: 13px; }

  /* Home greeting */
  .home-greeting { padding: 14px 16px 4px; font-size: 17px; }
  .section { padding: 8px 16px 20px; }
  .sec-title { font-size: 17px; }

  .quick-grid { grid-template-columns: repeat(2, 1fr); }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .card { padding: 12px; }
  .card-art { font-size: 36px; }
  .card-name { font-size: 12px; }
  .card-desc { font-size: 11px; }

  /* Playlist view */
  .pl-hero {
    flex-direction: column;
    align-items: flex-start;
    padding: 60px 16px 16px;
    gap: 14px;
  }
  .hero-art-pl { width: 110px; height: 110px; font-size: 44px; }
  .hero-title { font-size: 24px; letter-spacing: -0.5px; }
  .hero-type { font-size: 10px; }
  .hero-meta { font-size: 12px; }

  .pl-toolbar { padding: 12px 16px; gap: 14px; }
  .toolbar-desc { font-size: 12px; }

  .track-table { padding: 0 8px; }

// ─────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────
var state = { view: 'home', playlist: null, trackIdx: null, playing: false, progress: 0, timer: null, detailOpen: false };

// ─────────────────────────────────────────────────────────────────
//  HELPERS — render image or emoji fallback
// ─────────────────────────────────────────────────────────────────
function coverHTML(src, emoji, extraStyle) {
  // src = image path or null; emoji = fallback emoji string; extraStyle = inline styles for wrapper
  if (src) {
    return '<img src="' + src + '" alt="" onerror="this.style.display=\'none\'">';
  }
  return '<span style="' + (extraStyle || '') + '">' + emoji + '</span>';
}

// ─────────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────────
function init() {
  // Banner laden
  var bannerImg = document.getElementById('hero-banner-img');
  bannerImg.onerror = function() { this.style.display = 'none'; };
  bannerImg.src = 'images/banner.jpg';
  setGreeting();
  renderSidebar();
  renderHome();
}

function setGreeting() {
  var h = new Date().getHours();
  var msg = h < 12 ? "Guten Morgen" : h < 18 ? "Guten Tag" : "Guten Abend";
  document.getElementById('greeting').textContent = msg + " \uD83D\uDC4B";
}

// ─────────────────────────────────────────────────────────────────
//  RENDER SIDEBAR
// ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  var html = '';
  for (var i = 0; i < PLAYLISTS.length; i++) {
    var p = PLAYLISTS[i];
    var thumbContent = p.image
      ? '<img src="' + p.image + '" alt="" onerror="this.style.display=\'none\';this.insertAdjacentText(\'afterend\',\'' + p.emoji + '\')">'
      : p.emoji;
    html += '<div class="pl-item" id="si-' + p.id + '" onclick="openPlaylist(\'' + p.id + '\')">' +
      '<div class="pl-thumb" style="background:linear-gradient(135deg,' + p.color + ' 0%,' + p.color + '66 100%)">' + thumbContent + '</div>' +
      '<div class="pl-label"><div class="pl-name">' + p.name + '</div><div class="pl-meta">Playlist &middot; ' + p.tracks.length + ' Eintr&auml;ge</div></div>' +
    '</div>';
  }
  document.getElementById('sidebar-list').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────
//  RENDER HOME
// ─────────────────────────────────────────────────────────────────
function renderHome() {
  var chtml = '';
  for (var i = 0; i < PLAYLISTS.length; i++) {
    var p = PLAYLISTS[i];
    var grad = 'linear-gradient(135deg,' + p.color + ' 0%,' + p.color + '55 100%)';
    var artContent = p.image
      ? '<img src="' + p.image + '" alt="" onerror="this.style.display=\'none\'">' + '<span class="card-art-emoji">' + p.emoji + '</span>'
      : '<span class="card-art-emoji">' + p.emoji + '</span>';
    chtml += '<div class="card" onclick="openPlaylist(\'' + p.id + '\')">' +
      '<div class="card-art" style="background:' + grad + '">' + artContent +
        '<button class="play-fab" onclick="event.stopPropagation();openAndPlay(\'' + p.id + '\')">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="black"><polygon points="5,3 19,12 5,21"/></svg>' +
        '</button>' +
      '</div>' +
      '<div class="card-name">' + p.name + '</div>' +
      '<div class="card-desc">' + p.desc + '</div>' +
    '</div>';
  }
  document.getElementById('card-grid').innerHTML = chtml;
}

// ─────────────────────────────────────────────────────────────────
//  OPEN PLAYLIST
// ─────────────────────────────────────────────────────────────────
function openAndPlay(id) { openPlaylist(id); playFirst(); }

function openPlaylist(id) {
  var pl = null;
  for (var i = 0; i < PLAYLISTS.length; i++) { if (PLAYLISTS[i].id === id) { pl = PLAYLISTS[i]; break; } }
  if (!pl) return;
  state.playlist = pl;

  var items = document.querySelectorAll('.pl-item');
  for (var j = 0; j < items.length; j++) items[j].classList.remove('active');
  var si = document.getElementById('si-' + id);
  if (si) si.classList.add('active');
  document.getElementById('nav-home').classList.remove('active');

  // Hero
  document.getElementById('pl-hero').style.background = 'linear-gradient(160deg,' + pl.color + ' 0%,#181818 70%)';
  var artEl = document.getElementById('hero-art');
  artEl.style.background = 'linear-gradient(135deg,' + pl.color + ' 0%,' + pl.color + '66 100%)';
  var emojiEl = document.getElementById('hero-art-emoji');
  if (pl.image) {
    emojiEl.textContent = '';
    // inject img if not already there
    var existing = artEl.querySelector('img.hero-img');
    if (!existing) {
      var img = document.createElement('img');
      img.className = 'hero-img';
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover';
      img.src = pl.image;
      artEl.insertBefore(img, emojiEl);
    } else { existing.src = pl.image; }
  } else {
    var oldImg = artEl.querySelector('img.hero-img');
    if (oldImg) oldImg.remove();
    emojiEl.textContent = pl.emoji;
  }

  document.getElementById('hero-title').textContent = pl.name;
  document.getElementById('hero-meta').innerHTML = '<strong>Dinio Maag</strong> &middot; ' + pl.tracks.length + ' Eintr&auml;ge';
  document.getElementById('toolbar-desc').textContent = pl.desc;

  // Tracks
  var tbody = '';
  for (var k = 0; k < pl.tracks.length; k++) {
    var t = pl.tracks[k];
    var coverContent = t.cover
      ? '<img src="' + t.cover + '" alt="" onerror="this.style.display=\'none\'">'
      : '<span style="font-size:20px">' + pl.emoji + '</span>';
    tbody +=
      '<div class="track-row" id="tr-' + id + '-' + k + '" onclick="playTrack(' + k + ')">' +
        '<div class="t-idx"><span class="t-num">' + (k+1) + '</span><span class="t-play">&#9654;</span></div>' +
        '<div class="t-cover" style="background:linear-gradient(135deg,' + pl.color + ',' + pl.color + '55)">' + coverContent + '</div>' +
        '<div class="t-main"><div class="t-name">' + t.title + '</div><div class="t-sub">' + t.sub + '</div></div>' +
        '<div class="t-place">' + t.place + '</div>' +
        '<div class="t-year">' + t.year + '</div>' +
      '</div>';
  }
  document.getElementById('track-body').innerHTML = tbody;
  updateNavButtons();
  showView('playlist');
}

// ─────────────────────────────────────────────────────────────────
//  PLAY CONTROLS
// ─────────────────────────────────────────────────────────────────
function playFirst() {
  if (state.playlist && state.playlist.tracks.length > 0) playTrack(0);
}

function playTrack(idx) {
  var pl = state.playlist;
  if (!pl) return;
  var t = pl.tracks[idx];
  if (!t) return;
  state.trackIdx = idx;

  // Player bar thumbnail
  var thumb = document.getElementById('now-thumb');
  if (t.cover) {
    thumb.innerHTML = '<img src="' + t.cover + '" alt="" onerror="this.innerHTML=\'' + pl.emoji + '\'">';
  } else {
    thumb.innerHTML = pl.emoji;
  }
  thumb.style.background = 'linear-gradient(135deg,' + pl.color + ',' + pl.color + '88)';

  document.getElementById('now-title').textContent = t.title;
  document.getElementById('now-sub').textContent = t.place;

  // Highlight row
  var rows = document.querySelectorAll('.track-row');
  for (var i = 0; i < rows.length; i++) rows[i].classList.remove('playing');
  var row = document.getElementById('tr-' + pl.id + '-' + idx);
  if (row) {
    row.classList.add('playing');
    // Scroll into view smoothly
    row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  openDetailPanel(pl, t);
  updateNavButtons();
  startProgress();
}

function nextTrack() {
  var pl = state.playlist;
  if (!pl) return;
  var next = (state.trackIdx !== null ? state.trackIdx : -1) + 1;
  if (next < pl.tracks.length) playTrack(next);
}

function prevTrack() {
  var pl = state.playlist;
  if (!pl) return;
  var prev = (state.trackIdx !== null ? state.trackIdx : 1) - 1;
  if (prev >= 0) playTrack(prev);
}

function updateNavButtons() {
  var pl = state.playlist;
  var idx = state.trackIdx;
  var prevBtn = document.getElementById('btn-prev');
  var nextBtn = document.getElementById('btn-next');
  if (!pl) { prevBtn.disabled = true; nextBtn.disabled = true; return; }
  prevBtn.disabled = (idx === null || idx <= 0);
  nextBtn.disabled = (idx === null || idx >= pl.tracks.length - 1);
}

// ─────────────────────────────────────────────────────────────────
//  DETAIL PANEL
// ─────────────────────────────────────────────────────────────────
function openDetailPanel(pl, track) {
  var d = track.detail;
  if (!d) return;

  var imgContent = track.cover
    ? '<img src="' + track.cover + '" alt="">'
    : '<span style="font-size:90px;position:relative;z-index:1">' + pl.emoji + '</span>';

  var html =
    '<div style="position:relative">' +
      '<button class="detail-close" onclick="closeDetailPanel()">&#10005;</button>' +
      '<div class="detail-img" style="background:linear-gradient(135deg,' + pl.color + ' 0%,' + pl.color + '44 100%)">' +
        imgContent +
        '<div class="detail-img-overlay"></div>' +
      '</div>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-tag">' + d.tag + '</div>' +
      '<div class="detail-title">' + d.heading + '</div>' +
      '<div class="detail-company">' +
        '<span>' + d.company + '</span>' +
        '<span class="detail-year-badge">' + track.year + '</span>' +
      '</div>' +
      '<div class="detail-divider"></div>' +
      '<div class="detail-text">' + d.long + '</div>' +
      (d.highlight ? '<div class="detail-highlight">' + d.highlight + '</div>' : '') +
    '</div>';

  var inner = document.getElementById('detail-inner');
  inner.innerHTML = html;
  inner.scrollTop = 0;
  inner.classList.add('slide-in');
  setTimeout(function() { inner.classList.remove('slide-in'); }, 400);

  document.getElementById('detail-panel').classList.add('open');
  state.detailOpen = true;
  document.getElementById('panel-toggle-btn').classList.add('active');
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  state.detailOpen = false;
  document.getElementById('panel-toggle-btn').classList.remove('active');
}

function toggleDetailPanel() {
  if (state.detailOpen) { closeDetailPanel(); }
  else if (state.playlist && state.trackIdx !== null) {
    openDetailPanel(state.playlist, state.playlist.tracks[state.trackIdx]);
  }
}

function toggleDetailFromPlayer() { toggleDetailPanel(); }

// ─────────────────────────────────────────────────────────────────
//  PROGRESS
// ─────────────────────────────────────────────────────────────────
function startProgress() {
  clearInterval(state.timer);
  state.progress = 0;
  state.playing = true;
  updatePlayIcon();
  setProgressUI(0);
  state.timer = setInterval(function() {
    if (!state.playing) return;
    state.progress = Math.min(state.progress + 0.25, 100);
    setProgressUI(state.progress);
    if (state.progress >= 100) {
      clearInterval(state.timer);
      // Auto-advance to next track
      var pl = state.playlist;
      if (pl && state.trackIdx !== null && state.trackIdx < pl.tracks.length - 1) {
        playTrack(state.trackIdx + 1);
      } else {
        state.playing = false;
        updatePlayIcon();
      }
    }
  }, 400);
}

function setProgressUI(pct) {
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('p-dot').style.left = pct + '%';
  var total = 180, now = Math.round(pct / 100 * total);
  document.getElementById('t-now').textContent = fmtTime(now);
  document.getElementById('t-total').textContent = fmtTime(total);
}

function fmtTime(s) { return Math.floor(s/60) + ':' + ('0'+(s%60)).slice(-2); }
function togglePlay() { state.playing = !state.playing; updatePlayIcon(); }
function updatePlayIcon() {
  var ip = document.getElementById('icon-play'), ipa = document.getElementById('icon-pause');
  if (state.playing) { ip.classList.add('hidden'); ipa.classList.remove('hidden'); }
  else { ip.classList.remove('hidden'); ipa.classList.add('hidden'); }
}

function scrub(e) {
  var bar = document.getElementById('p-bar');
  var rect = bar.getBoundingClientRect();
  state.progress = Math.max(0, Math.min(100, (e.clientX-rect.left)/rect.width*100));
  setProgressUI(state.progress);
}

//  VIEWS
// ─────────────────────────────────────────────────────────────────
function showView(name) {
  var vh = document.getElementById('view-home');
  var vp = document.getElementById('view-playlist');
  if (name === 'home') {
    vh.classList.remove('hidden'); vp.classList.add('hidden');
    vh.classList.add('fade-up'); setTimeout(function(){ vh.classList.remove('fade-up'); }, 400);
  } else {
    vh.classList.add('hidden'); vp.classList.remove('hidden');
    vp.classList.add('fade-up'); setTimeout(function(){ vp.classList.remove('fade-up'); }, 400);
  }
  state.view = name;
  document.getElementById('content').scrollTop = 0;
}

function showHome() {
  var items = document.querySelectorAll('.pl-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  document.getElementById('nav-home').classList.add('active');
  setMobileNav('home');
  showView('home');
}

function goBack() { if (state.view !== 'home') showHome(); }

// ─────────────────────────────────────────────────────────────────
//  MOBILE HELPERS
// ─────────────────────────────────────────────────────────────────
function setMobileNav(active) {
  var btns = document.querySelectorAll('.mobile-nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var b = document.getElementById('mob-btn-' + active);
  if (b) b.classList.add('active');
}

function openMobileLibrary() {
  setMobileNav('lib');
  var sheet = document.getElementById('mobile-lib-sheet');
  var list = document.getElementById('mobile-lib-list');
  // Build list
  var html = '';
  for (var i = 0; i < PLAYLISTS.length; i++) {
    var pl = PLAYLISTS[i];
    html += '<div class="pl-item" onclick="openPlaylist(\'' + pl.id + '\'); closeMobileLibrary(); setMobileNav(\'home\')" style="margin-bottom:4px">' +
      '<div class="pl-thumb" style="background:linear-gradient(135deg,' + pl.color + ',' + pl.color + '88)">' +
        (pl.image ? '<img src="' + pl.image + '" onerror="this.style.display=\'none\'">' : '') +
        '<span style="' + (pl.image ? 'display:none' : '') + '">' + pl.emoji + '</span>' +
      '</div>' +
      '<div class="pl-label"><div class="pl-name">' + pl.name + '</div><div class="pl-meta">Playlist &middot; Dinio Maag</div></div>' +
    '</div>';
  }
  list.innerHTML = html;
  sheet.style.display = 'block';
}

function closeMobileLibrary() {
  document.getElementById('mobile-lib-sheet').style.display = 'none';
}

// Show/hide mobile detail button when a track is selected
var _origOpenDetailPanel = openDetailPanel;
openDetailPanel = function(pl, track) {
  _origOpenDetailPanel(pl, track);
  var btn = document.getElementById('mob-btn-detail');
  if (btn) btn.style.display = '';
};

init();
</script>
